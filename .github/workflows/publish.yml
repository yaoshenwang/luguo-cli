name: Publish to npm

# Triggers on pushing a v* tag (e.g. v0.1.0) and publishes to npm.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Zero runtime deps: run npm ci only if a lockfile exists, otherwise skip.
      - name: Install dependencies (if any)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json — zero-dependency package, skipping install."
          fi

      # Pre-release versions (e.g. 0.1.5-beta.0) publish under the `beta` dist-tag
      # so `npm i -g luguo-cli` (which tracks `latest`) is never disrupted by a
      # test build. Stable versions publish to `latest` as usual.
      - name: Publish
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "Pre-release $VERSION -> dist-tag 'beta'"
            npm publish --access public --tag beta
          else
            echo "Release $VERSION -> dist-tag 'latest'"
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
