name: Publish to npm

# 推送 v* 形式的 tag（如 v0.1.0）时自动发布到 npm。
# Triggers on pushing a v* tag (e.g. v0.1.0) and publishes to npm.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # 零运行时依赖：有 lockfile 才 npm ci，否则跳过。
      # Zero runtime deps: run npm ci only if a lockfile exists, otherwise skip.
      - name: Install dependencies (if any)
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json — zero-dependency package, skipping install."
          fi

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
